    <style>
        .ty {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5rem 1.5rem;
            text-align: center;
        }
        .ty__inner {
            max-width: 560px;
            padding: 2.5rem;
            border: 1px solid var(--border);
            border-radius: var(--r-xl);
            background: var(--surface-1);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
        }
        .ty__inner::before {
            content: "";
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            padding: 1px;
            background: var(--grad);
            -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.4;
            pointer-events: none;
        }
        .ty__icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 1.25rem;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--grad);
            color: #fff;
            font-size: 1.75rem;
            box-shadow: var(--glow-md);
        }
        .ty__title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(1.6rem, 3.5vw, 2.2rem);
            margin-bottom: 0.75rem;
        }
        .ty__sub {
            color: var(--text-mute);
            margin-bottom: 2rem;
            line-height: 1.7;
        }
        .ty__actions {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .ty__retry {
            display: block;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-dim);
            text-decoration: underline;
            text-underline-offset: 3px;
        }
        .ty__retry:hover { color: var(--text); }
    </style>
</head>

<body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-N23PS4MN" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

    <main class="ty">
        <div class="ty__inner">
            <div class="ty__icon"><i class="fas fa-check" aria-hidden="true"></i></div>
            <h1 class="ty__title" data-i18n="thankyou_title">Thanks for downloading my CV!</h1>
            <p class="ty__sub" data-i18n="thankyou_sub">Your download should start automatically. While you wait, take a look at the rest of the portfolio.</p>

            <div class="ty__actions">
                <a href="index.html#projects" class="btn btn--primary">
                    <i class="fas fa-arrow-left" aria-hidden="true"></i>
                    <span data-i18n="thankyou_cta">Back to portfolio</span>
                </a>
                <a href="https://www.linkedin.com/in/antonio-luis-perez-carmona/" target="_blank" rel="noopener" class="btn btn--ghost">
                    <i class="fab fa-linkedin" aria-hidden="true"></i>
                    <span>LinkedIn</span>
                </a>
            </div>

            <a id="download-link" href="cv-antonio-perez.pdf" download class="ty__retry" data-i18n="thankyou_retry">Download didn't start? Click here.</a>
        </div>
    </main>

    <script src="script.js" defer></script>
    <script>
        window.addEventListener('load', () => {
            const a = document.getElementById('download-link');
            if (a) a.click();
        });
    </script>
</body>
</html>
